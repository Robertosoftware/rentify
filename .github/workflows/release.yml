name: Release

on:
  push:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, scrapers]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rentify-${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rentify-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Tag release
        if: matrix.service == 'backend'
        run: echo "Release ${{ github.sha }} built and scanned"
