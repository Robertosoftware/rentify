name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, scaffold]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rentify_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev

      - name: Lint
        working-directory: backend
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        working-directory: backend
        run: uv run mypy app --ignore-missing-imports

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL_SYNC: postgresql://postgres:password@localhost:5432/rentify_test
        run: uv run alembic upgrade head

      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/rentify_test
          DATABASE_URL_SYNC: postgresql://postgres:password@localhost:5432/rentify_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          MOCK_STRIPE: "true"
          MOCK_EMAIL: "true"
          MOCK_TELEGRAM: "true"
        run: uv run pytest -q --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  sonar:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
